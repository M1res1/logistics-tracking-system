events {
    worker_connections 1024;
}

http {
    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream auth_service        { server auth:8080; }
    upstream orders_service      { server orders:8081; }
    upstream deliveries_service  { server deliveries:8082; }
    upstream restaurants_service { server restaurants:8083; }
    upstream payments_service    { server payments:8084; }

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $request - $status '
                    '$body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen 80;

        # Pass real client IP to services
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;

        # ── Route by path prefix ──────────────────────────────────────────────
        location /api/v1/auth/ {
            proxy_pass http://auth_service;
        }

        location /orders/ {
            proxy_pass http://orders_service;
        }

        location /deliveries/ {
            proxy_pass http://deliveries_service;
        }

        location /restaurants/ {
            proxy_pass http://restaurants_service;
        }

        location /payments/ {
            proxy_pass http://payments_service;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
