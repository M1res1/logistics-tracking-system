events {
    worker_connections 1024;
}

http {
    upstream auth_service        { server auth:8080; }
    upstream orders_service      { server orders:8081; }
    upstream deliveries_service  { server deliveries:8082; }
    upstream restaurants_service { server restaurants:8083; }
    upstream payments_service    { server payments:8084; }

    log_format main '$remote_addr - $request - $status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        location /api/v1/auth/ {
            proxy_pass http://auth_service;
        }

        location /api/v1/orders {
            proxy_pass http://orders_service;
        }

        location ~ ^/api/v1/orders(/.*)?$ {
            proxy_pass http://orders_service;
        }

        location ~ ^/api/v1/deliveries(/.*)?$ {
            proxy_pass http://deliveries_service;
        }

        location ~ ^/api/v1/drivers(/.*)?$ {
            proxy_pass http://deliveries_service;
        }

        location ~ ^/api/v1/restaurants(/.*)?$ {
            proxy_pass http://restaurants_service;
        }

        location ~ ^/api/v1/payments(/.*)?$ {
            proxy_pass http://payments_service;
        }

        location ~ ^/api/v1/wallet(/.*)?$ {
            proxy_pass http://payments_service;
        }

        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
