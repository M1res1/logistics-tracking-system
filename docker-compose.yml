version: "3.9"

x-go-service: &go-service
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-""}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ── Application services ────────────────────────────────────────────────────
  auth:
    <<: *go-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth
    environment:
      PORT: ${AUTH_PORT:-8080}
    ports:
      - "${AUTH_PORT:-8080}:${AUTH_PORT:-8080}"

  orders:
    <<: *go-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: orders
    environment:
      PORT: ${ORDERS_PORT:-8081}
    ports:
      - "${ORDERS_PORT:-8081}:${ORDERS_PORT:-8081}"

  deliveries:
    <<: *go-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: deliveries
    environment:
      PORT: ${DELIVERIES_PORT:-8082}
    ports:
      - "${DELIVERIES_PORT:-8082}:${DELIVERIES_PORT:-8082}"

  restaurants:
    <<: *go-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: restaurants
    environment:
      PORT: ${RESTAURANTS_PORT:-8083}
    ports:
      - "${RESTAURANTS_PORT:-8083}:${RESTAURANTS_PORT:-8083}"

  payments:
    <<: *go-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: payments
    environment:
      PORT: ${PAYMENTS_PORT:-8084}
    ports:
      - "${PAYMENTS_PORT:-8084}:${PAYMENTS_PORT:-8084}"

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - orders
      - deliveries
      - restaurants
      - payments

  # ── Observability (bonus) ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  prometheus_data:
  grafana_data:
