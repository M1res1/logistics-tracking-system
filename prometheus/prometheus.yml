global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: auth
    static_configs:
      - targets: ["auth:8080"]

  - job_name: orders
    static_configs:
      - targets: ["orders:8081"]

  - job_name: deliveries
    static_configs:
      - targets: ["deliveries:8082"]

  - job_name: restaurants
    static_configs:
      - targets: ["restaurants:8083"]

  - job_name: payments
    static_configs:
      - targets: ["payments:8084"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx:80"]
